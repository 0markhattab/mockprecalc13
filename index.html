function generateCode(name, scores) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const ts = Date.now().toString(36).slice(-4).toUpperCase();
  const initials = name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0,3);
  return `${initials}-U13-${total}-${ts}`;
}

function OptionButton({ text, selected, correct, revealed, onClick }) {
  let bg = "rgba(255,255,255,0.04)", border = "1px solid rgba(255,255,255,0.1)", color = "rgba(255,255,255,0.85)";
  if (selected && !revealed) { bg = "rgba(31,111,235,0.15)"; border = `1px solid ${C.blue}`; color = "#fff"; }
  if (revealed && selected && correct) { bg = "rgba(6,214,160,0.18)"; border = `1px solid ${C.green}`; color = C.green; }
  if (revealed && selected && !correct) { bg = "rgba(239,71,111,0.18)"; border = `1px solid ${C.coral}`; color = C.coral; }
  if (revealed && !selected && correct) { bg = "rgba(6,214,160,0.08)"; border = `1px solid rgba(6,214,160,0.4)`; color = C.green; }
  return (
    <button onClick={onClick} disabled={revealed} style={{
      display: "block", width: "100%", textAlign: "left", padding: "12px 16px", fontSize: 14, lineHeight: 1.45,
      fontFamily: "'DM Sans',sans-serif", background: bg, border, color, borderRadius: 10,
      cursor: revealed?"default":"pointer", transition: "all .2s", marginBottom: 8,
    }}>
      {text}
      {revealed && selected && correct && <span style={{ float: "right" }}>✓</span>}
      {revealed && selected && !correct && <span style={{ float: "right" }}>✗</span>}
    </button>
  );
}

  return (
    <div style={{ position: "fixed", top: 12, right: 16, background: "rgba(11,31,58,0.92)", border: `1px solid ${warn?C.coral+"60":"rgba(255,255,255,0.1)"}`, borderRadius: 10, padding: "6px 14px", fontSize: 13, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: warn?C.coral:"rgba(255,255,255,0.5)", zIndex: 999, backdropFilter: "blur(8px)" }}>

  );
}

// ─── MC SECTION ─────────────────────────────────────────────────

function MCSection({ onNext, score, setScore, scoreKey, questions, icon, title, subtitle, unitTag }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const allDone = Object.keys(revealed).length === questions.length;
  const tagColor = unitTag==="Unit 1"?C.cyan:unitTag==="Unit 3"?C.purple:C.teal;

  function select(qi, oi) { if (revealed[qi] !== undefined) return; setAnswers(a => ({ ...a, [qi]: oi })); }
  function check(qi) { if (answers[qi] === undefined) return; setRevealed(r => ({ ...r, [qi]: true })); }

  useEffect(() => {
    if (allDone) {
      const pts = questions.reduce((s, q, i) => s + (answers[i]===q.correct?1:0), 0);
      setScore(sc => ({ ...sc, [scoreKey]: pts }));
    }
  }, [allDone]);

  return (
    <div style={{ animation: "fadeUp .5s ease" }}>
      <SectionHeader icon={icon} title={title} subtitle={subtitle} unitTag={unitTag} />
      {questions.map((q, qi) => (
        <div key={qi} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 14, padding: "18px 20px", marginBottom: 16, animation: `fadeUp .4s ease ${qi*0.035}s both` }}>
          <div style={{ fontSize: 11, color: tagColor, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Q{qi+1}</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 12 }}>{q.question}</div>
          {q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi]===oi} correct={oi===q.correct} revealed={!!revealed[qi]} onClick={() => select(qi,oi)} />
          ))}
          {!revealed[qi] && answers[qi]!==undefined && <button onClick={() => check(qi)} style={checkBtnStyle(C.blue)}>Check Answer</button>}
          {revealed[qi] && answers[qi]!==q.correct && <div style={{ marginTop:8, fontSize:13, color:C.coral }}>Correct: <strong>{q.options[q.correct]}</strong></div>}
          {revealed[qi] && q.explanation && <Callout color={answers[qi]===q.correct?C.green:C.orange} style={{ marginTop:10, marginBottom:0 }}>{q.explanation}</Callout>}
        </div>
      ))}
      {allDone && (
        <div style={{ textAlign: "center", marginTop: 16, animation: "popIn .4s ease" }}>
          <div style={{ color: C.green, fontSize: 15, fontWeight: 700, marginBottom: 14 }}>Section complete! {score[scoreKey]||0}/{questions.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>Next Section →</button>
        </div>
      )}
    </div>
  );
}

        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 38, fontWeight: 900, color: "#fff" }}>{pct}%</div>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.4)" }}>{totalPts}/{totalMax}</div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 20, justifyContent: "center" }}>
        {[
          { label:"Unit 1", pts:u1Pts, max:u1Max, color:C.cyan },
          { label:"Unit 3", pts:u3Pts, max:u3Max, color:C.purple },
          { label:"Mixed", pts:score.mixed||0, max:MIXED_REVIEW.length, color:C.teal },
        ].map(u => (
          <div key={u.label} style={{ flex:1, background:u.color+"10", border:`1px solid ${u.color}30`, borderRadius:12, padding:"14px 16px" }}>
            <div style={{ fontSize:10, fontWeight:800, color:u.color, textTransform:"uppercase", letterSpacing:".08em", marginBottom:4 }}>{u.label}</div>
            <div style={{ fontSize:22, fontWeight:900, color:"#fff" }}>{u.max>0?Math.round(u.pts/u.max*100):0}%</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{u.pts}/{u.max}</div>
          </div>
        ))}
      </div>

      <div style={{ textAlign: "left", marginBottom: 24 }}>
        {sections.map((sec, si) => {
          const pts = score[sec.key]||0;
          const p = sec.total>0?Math.round((pts/sec.total)*100):0;
          return (
            <div key={sec.key} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 14px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:10, marginBottom:7, animation:`fadeUp .3s ease ${si*0.04}s both` }}>
              <span style={{ fontSize:15 }}>{sec.icon}</span>
              <span style={{ flex:1, fontSize:11.5, color:"rgba(255,255,255,0.75)", fontWeight:600 }}>{sec.label}</span>
              <div style={{ width:60, height:5, background:"rgba(255,255,255,0.06)", borderRadius:999, overflow:"hidden" }}>
                <div style={{ width:p+"%", height:"100%", background:p===100?C.green:p>=60?C.blue:C.coral, borderRadius:999, transition:"width .6s" }} />
              </div>
              <span style={{ fontSize:11.5, fontWeight:700, color:"#fff", minWidth:36, textAlign:"right", fontFamily:"'JetBrains Mono',monospace" }}>{pts}/{sec.total}</span>
            </div>
          );
        })}
      </div>

      <div style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:14, padding:20, marginBottom:20 }}>
        <div style={{ fontSize:11, fontWeight:800, color:C.orange, textTransform:"uppercase", letterSpacing:".08em", marginBottom:8 }}>Your Completion Code</div>
        <div style={{ fontSize:24, fontWeight:900, fontFamily:"'JetBrains Mono',monospace", color:"#fff", letterSpacing:".1em", marginBottom:12 }}>{code}</div>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", marginBottom:14 }}>Share this code with Mr. Omar or copy your full results below.</div>
        <button onClick={copyResults} style={{ padding:"10px 28px", fontSize:13, fontWeight:700, border:`1px solid ${C.teal}`, borderRadius:999, background:copied?`${C.green}20`:"transparent", color:copied?C.green:C.teal, cursor:"pointer", transition:"all .3s" }}>
          {copied?"✓ Copied!":"📋 Copy Full Results"}
        </button>
      </div>
      <button onClick={onRestart} style={{ padding:"12px 36px", fontSize:14, fontWeight:700, border:"1px solid rgba(255,255,255,0.12)", borderRadius:999, background:"transparent", color:"rgba(255,255,255,0.5)", cursor:"pointer" }}>↻ Retake Test</button>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────

function App() {
  const [section, setSection] = useState(0);
  const [studentName, setStudentName] = useState("");
  const initScore = {u1_roc:0,u1_poly:0,u1_rational:0,u1_transform:0,u1_compose:0,u3_periodic:0,u3_unitcircle:0,u3_sinusoidal:0,u3_phasefreq:0,u3_othertrig:0,u3_inverse:0,mixed:0};
  const [score, setScore] = useState({...initScore});
  const [started, setStarted] = useState(false);

  const next = () => { setSection(s => Math.min(s+1,SECTIONS.length-1)); if(!started) setStarted(true); };
  const restart = () => { setSection(0); setStarted(false); setScore({...initScore}); };
  useEffect(() => { const el=document.getElementById("ws-top"); if(el) el.scrollIntoView({behavior:"smooth"}); },[section]);

  return (
    <div id="ws-top" style={{ maxWidth:700, margin:"0 auto", padding:"32px 20px 60px" }}>
      {started && section < SECTIONS.length-1 && <Timer />}
      {section > 0 && section < SECTIONS.length-1 && (
        <div style={{ marginBottom:20 }}>
          <SectionNav idx={section} onNav={setSection} />
          <div style={{ marginTop:8 }}><ProgressBar current={section} total={SECTIONS.length} /></div>
        </div>
      )}

      {section===0 && <Welcome onNext={next} studentName={studentName} setStudentName={setStudentName} />}

      {section===1 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u1_roc" questions={U1_ROC} icon="📈" title="Section 1: Rates of Change (1.1–1.3)" subtitle="Average ROC, concavity, and how rates change for different function types." unitTag="Unit 1" />}
      {section===2 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u1_poly" questions={U1_POLY} icon="📉" title="Section 2: Polynomial Functions (1.4–1.6)" subtitle="Zeros, multiplicity, end behavior, turning points." unitTag="Unit 1" />}
      {section===3 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u1_rational" questions={U1_RATIONAL} icon="➗" title="Section 3: Rational Functions (1.7–1.10)" subtitle="VA, HA, holes, slant asymptotes, zeros, and end behavior." unitTag="Unit 1" />}
      {section===4 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u1_transform" questions={U1_TRANSFORM} icon="🔀" title="Section 4: Transformations (1.11)" subtitle="Shifts, reflections, stretches, compressions — applied to functions and points." unitTag="Unit 1" />}
      {section===5 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u1_compose" questions={U1_COMPOSE} icon="🔗" title="Section 5: Composition, Inverses & Models (1.12–1.14)" subtitle="f(g(x)), finding inverses, horizontal line test, model selection." unitTag="Unit 1" />}

      {section===6 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_periodic" questions={U3_PERIODIC} icon="🔄" title="Section 6: Periodic Functions & Angles (3.1–3.2)" subtitle="Period, degree ↔ radian, coterminal angles, trig from a point." unitTag="Unit 3" />}
      {section===7 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_unitcircle" questions={U3_UNITCIRCLE} icon="⭕" title="Section 7: Unit Circle & Exact Values (3.3)" subtitle="No calculator! Reference angles + quadrant signs." unitTag="Unit 3" />}
      {section===8 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_sinusoidal" questions={U3_SINUSOIDAL} icon="〰️" title="Section 8: Sinusoidal Features (3.4–3.5)" subtitle="Amplitude, period, midline, range, point rules, frequency." unitTag="Unit 3" />}
      {section===9 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_phasefreq" questions={U3_PHASEFREQ} icon="↔️" title="Section 9: Phase Shifts & Frequency (3.5–3.6)" subtitle="B(x − C) form, phase shifts, key x-values, Hz." unitTag="Unit 3" />}
      {section===10 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_othertrig" questions={U3_OTHERTRIG} icon="📐" title="Section 10: Tan, Sec, Csc, Cot (3.7–3.8)" subtitle="Definitions, periods, vertical asymptotes, ranges." unitTag="Unit 3" />}
      {section===11 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_inverse" questions={U3_INVERSE} icon="🔁" title="Section 11: Inverse Trig Functions (3.9)" subtitle="Restricted domains, ranges, and evaluating arcsin, arccos, arctan." unitTag="Unit 3" />}

      {section===12 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="mixed" questions={MIXED_REVIEW} icon="🔥" title="Section 12: Mixed Review — Units 1 & 3" subtitle="Boss battle! Test-style problems from BOTH units combined." unitTag={null} />}

      {section===13 && <ResultsSection score={score} studentName={studentName} onRestart={restart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
