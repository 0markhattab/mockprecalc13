function generateCode(name, scores) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const ts = Date.now().toString(36).slice(-4).toUpperCase();
  const initials = name.trim().split(/\s+/).map(w => w[0]).join("").toUpperCase().slice(0, 3);
  return `${initials}-MT-${total}-${ts}`;
}

function OptionButton({ text, selected, correct, revealed, onClick }) {
  let bg = "rgba(255,255,255,0.04)", border = "1px solid rgba(255,255,255,0.1)", color = "rgba(255,255,255,0.85)";
  if (selected && !revealed) { bg = `rgba(31,111,235,0.15)`; border = `1px solid ${C.blue}`; color = "#fff"; }
  if (revealed && selected && correct) { bg = "rgba(6,214,160,0.18)"; border = `1px solid ${C.green}`; color = C.green; }
  if (revealed && selected && !correct) { bg = "rgba(239,71,111,0.18)"; border = `1px solid ${C.coral}`; color = C.coral; }
  if (revealed && !selected && correct) { bg = "rgba(6,214,160,0.08)"; border = `1px solid rgba(6,214,160,0.4)`; color = C.green; }
  return (
    <button onClick={onClick} disabled={revealed} style={{
      display: "block", width: "100%", textAlign: "left", padding: "12px 16px", fontSize: 14, lineHeight: 1.45,
      fontFamily: "'DM Sans',sans-serif", background: bg, border, color, borderRadius: 10,
      cursor: revealed ? "default" : "pointer", transition: "all .2s", marginBottom: 8,
    }}>
      {text}
      {revealed && selected && correct && <span style={{ float: "right" }}>✓</span>}
      {revealed && selected && !correct && <span style={{ float: "right" }}>✗</span>}
    </button>
  );
}

function Callout({ color, title, children, style: s }) {
  return (
    <div style={{ background: color + "12", border: `1px solid ${color}40`, borderRadius: 12, padding: "14px 18px", marginBottom: 14, ...s }}>

      <div style={{ fontSize: 14, color: "rgba(255,255,255,0.8)", lineHeight: 1.6 }}>{children}</div>
    </div>
  );
}

function Timer() {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(id);
  }, []);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  return (
    <div style={{ position: "fixed", top: 12, right: 16, background: "rgba(11,31,58,0.9)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "6px 14px", fontSize: 13, fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: elapsed >= 3600 ? C.coral : "rgba(255,255,255,0.5)", zIndex: 999, backdropFilter: "blur(8px)" }}>
      ⏱ {String(mins).padStart(2, "0")}:{String(secs).padStart(2, "0")}
    </div>
  );
}

// ─── GENERIC MC SECTION ─────────────────────────────────────────────────────

function MCSection({ onNext, score, setScore, scoreKey, questions, icon, title, subtitle, unitTag }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const allDone = Object.keys(revealed).length === questions.length;

  function select(qi, oi) { if (revealed[qi] !== undefined) return; setAnswers(a => ({ ...a, [qi]: oi })); }
  function check(qi) { if (answers[qi] === undefined) return; setRevealed(r => ({ ...r, [qi]: true })); }

  useEffect(() => {
    if (allDone) {
      const pts = questions.reduce((s, q, i) => s + (answers[i] === q.correct ? 1 : 0), 0);
      setScore(sc => ({ ...sc, [scoreKey]: pts }));
    }
  }, [allDone]);

  return (
    <div style={{ animation: "fadeUp .5s ease" }}>
      <SectionHeader icon={icon} title={title} subtitle={subtitle} unitTag={unitTag} />
      {questions.map((q, qi) => (
        <div key={qi} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 14, padding: "18px 20px", marginBottom: 16, animation: `fadeUp .4s ease ${qi * 0.04}s both` }}>
          <div style={{ fontSize: 11, color: unitTag === "Unit 2" ? C.orange : unitTag === "Unit 3" ? C.purple : C.teal, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Q{qi + 1}</div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "#fff", marginBottom: 12, fontFamily: "'DM Sans', 'JetBrains Mono', sans-serif" }}>{q.question}</div>
          {q.options.map((opt, oi) => (
            <OptionButton key={oi} text={opt} selected={answers[qi] === oi} correct={oi === q.correct} revealed={!!revealed[qi]} onClick={() => select(qi, oi)} />
          ))}
          {!revealed[qi] && answers[qi] !== undefined && <button onClick={() => check(qi)} style={checkBtnStyle(C.blue)}>Check Answer</button>}
          {revealed[qi] && answers[qi] !== q.correct && <div style={{ marginTop: 8, fontSize: 13, color: C.coral }}>Correct: <strong>{q.options[q.correct]}</strong></div>}
          {revealed[qi] && q.explanation && <Callout color={answers[qi] === q.correct ? C.green : C.orange} style={{ marginTop: 10, marginBottom: 0 }}>{q.explanation}</Callout>}
        </div>
      ))}
      {allDone && (
        <div style={{ textAlign: "center", marginTop: 16, animation: "popIn .4s ease" }}>
          <div style={{ color: C.green, fontSize: 15, fontWeight: 700, marginBottom: 14 }}>Section complete! {score[scoreKey] || 0}/{questions.length} correct</div>
          <button onClick={onNext} style={nextBtnStyle}>Next Section →</button>
        </div>
      )}
    </div>
  );
}

        </div>
        <div style={{ flex: 1, background: `${C.purple}10`, border: `1px solid ${C.purple}30`, borderRadius: 12, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: C.purple, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Unit 3</div>
          <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>{Math.round(u3Pts/u3Max*100)}%</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{u3Pts}/{u3Max}</div>
        </div>
        <div style={{ flex: 1, background: `${C.teal}10`, border: `1px solid ${C.teal}30`, borderRadius: 12, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: C.teal, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Mixed</div>
          <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>{MIXED_REVIEW.length > 0 ? Math.round((score.mixed||0)/MIXED_REVIEW.length*100) : 0}%</div>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{score.mixed||0}/{MIXED_REVIEW.length}</div>
        </div>
      </div>

      <div style={{ textAlign: "left", marginBottom: 24 }}>
        {sections.map((sec, si) => {
          const pts = score[sec.key] || 0;
          const p = sec.total > 0 ? Math.round((pts / sec.total) * 100) : 0;
          const unitColor = sec.unit === 2 ? C.orange : sec.unit === 3 ? C.purple : C.teal;
          return (
            <div key={sec.key} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, marginBottom: 8, animation: `fadeUp .3s ease ${si * 0.05}s both` }}>
              <span style={{ fontSize: 16 }}>{sec.icon}</span>
              <span style={{ flex: 1, fontSize: 12, color: "rgba(255,255,255,0.75)", fontWeight: 600 }}>{sec.label}</span>
              <div style={{ width: 70, height: 6, background: "rgba(255,255,255,0.06)", borderRadius: 999, overflow: "hidden" }}>
                <div style={{ width: p + "%", height: "100%", background: p === 100 ? C.green : p >= 60 ? C.blue : C.coral, borderRadius: 999, transition: "width .6s" }} />
              </div>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#fff", minWidth: 40, textAlign: "right", fontFamily: "'JetBrains Mono',monospace" }}>{pts}/{sec.total}</span>
            </div>
          );
        })}
      </div>

      <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "20px", marginBottom: 20 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: C.orange, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 8 }}>Your Completion Code</div>
        <div style={{ fontSize: 24, fontWeight: 900, fontFamily: "'JetBrains Mono',monospace", color: "#fff", letterSpacing: ".1em", marginBottom: 12 }}>{code}</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 14 }}>Share this code with Mr. Omar or copy your full results below.</div>
        <button onClick={copyResults} style={{ padding: "10px 28px", fontSize: 13, fontWeight: 700, border: `1px solid ${C.teal}`, borderRadius: 999, background: copied ? `${C.green}20` : "transparent", color: copied ? C.green : C.teal, cursor: "pointer", transition: "all .3s" }}>
          {copied ? "✓ Copied to Clipboard!" : "📋 Copy Full Results"}
        </button>
      </div>
      <button onClick={onRestart} style={{ padding: "12px 36px", fontSize: 14, fontWeight: 700, border: "1px solid rgba(255,255,255,0.12)", borderRadius: 999, background: "transparent", color: "rgba(255,255,255,0.5)", cursor: "pointer" }}>↻ Retake Test</button>
    </div>
  );
}

// ─── APP ────────────────────────────────────────────────────────────────────

function App() {
  const [section, setSection] = useState(0);
  const [studentName, setStudentName] = useState("");
  const [score, setScore] = useState({
    u2_logbasics: 0, u2_inverses: 0, u2_logprops: 0, u2_solving: 0, u2_modeling: 0,
    u3_angles: 0, u3_unitcircle: 0, u3_sinusoidal: 0, u3_phaseshift: 0, mixed: 0,
  });
  const [started, setStarted] = useState(false);

  const next = () => {
    setSection(s => Math.min(s + 1, SECTIONS.length - 1));
    if (!started) setStarted(true);
  };
  const restart = () => {
    setSection(0);
    setStarted(false);
    setScore({ u2_logbasics: 0, u2_inverses: 0, u2_logprops: 0, u2_solving: 0, u2_modeling: 0, u3_angles: 0, u3_unitcircle: 0, u3_sinusoidal: 0, u3_phaseshift: 0, mixed: 0 });
  };
  useEffect(() => { const el = document.getElementById("ws-top"); if (el) el.scrollIntoView({ behavior: "smooth" }); }, [section]);

  return (
    <div id="ws-top" style={{ maxWidth: 700, margin: "0 auto", padding: "32px 20px 60px" }}>
      {started && section < SECTIONS.length - 1 && <Timer />}
      {section > 0 && section < SECTIONS.length - 1 && (
        <div style={{ marginBottom: 20 }}>
          <SectionNav idx={section} onNav={setSection} />
          <div style={{ marginTop: 8 }}><ProgressBar current={section} total={SECTIONS.length} /></div>
        </div>
      )}

      {section === 0 && <Welcome onNext={next} studentName={studentName} setStudentName={setStudentName} />}

      {/* UNIT 2 SECTIONS */}
      {section === 1 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u2_logbasics"
        questions={U2_LOGBASICS} icon="📐" title="Section 1: Log ↔ Exponential Conversions & Evaluate"
        subtitle="Convert between forms and evaluate logarithms without a calculator." unitTag="Unit 2" />}

      {section === 2 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u2_inverses"
        questions={U2_INVERSES} icon="🔄" title="Section 2: Inverse Functions & Graph Features"
        subtitle="Find inverses, identify asymptotes, domains, ranges, and behavior." unitTag="Unit 2" />}

      {section === 3 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u2_logprops"
        questions={U2_LOGPROPS} icon="📏" title="Section 3: Log Properties — Expand, Condense, Change of Base"
        subtitle="Apply product, quotient, and power rules. Watch for false identities!" unitTag="Unit 2" />}

      {section === 4 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u2_solving"
        questions={U2_SOLVING} icon="🧮" title="Section 4: Solving Equations & Inequalities"
        subtitle="Exponential/log equations, quadratic-type, and inequality flip cases." unitTag="Unit 2" />}

      {section === 5 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u2_modeling"
        questions={U2_MODELING} icon="📊" title="Section 5: Modeling & Semi-Log"
        subtitle="Model identification, semi-log conversions, growth/decay, residuals." unitTag="Unit 2" />}

      {/* UNIT 3 SECTIONS */}
      {section === 6 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_angles"
        questions={U3_ANGLES} icon="📐" title="Section 6: Angles, Radians & Trig from a Point"
        subtitle="Degree ↔ radian conversions, coterminal angles, and trig ratios from coordinates." unitTag="Unit 3" />}

      {section === 7 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_unitcircle"
        questions={U3_UNITCIRCLE} icon="⭕" title="Section 7: Unit Circle & Exact Values"
        subtitle="No calculator! Use reference angles + quadrant signs for exact trig values." unitTag="Unit 3" />}

      {section === 8 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_sinusoidal"
        questions={U3_SINUSOIDAL} icon="〰️" title="Section 8: Sinusoidal Functions — Features & Point Rules"
        subtitle="Amplitude, period, midline, range, frequency, and transformation rules." unitTag="Unit 3" />}

      {section === 9 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="u3_phaseshift"
        questions={U3_PHASESHIFT} icon="↔️" title="Section 9: Phase Shifts & Writing Equations"
        subtitle="B(x − C) form, phase shifts, and writing equations from descriptions." unitTag="Unit 3" />}

      {/* MIXED */}
      {section === 10 && <MCSection onNext={next} score={score} setScore={setScore} scoreKey="mixed"
        questions={MIXED_REVIEW} icon="🔥" title="Section 10: Mixed Review — Units 2 & 3"
        subtitle="Test-style problems mixing all topics. This is the boss battle!" unitTag={null} />}

      {section === 11 && <ResultsSection score={score} studentName={studentName} onRestart={restart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
